<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>rustyboy </title>
<style>
  :root {
    --bg: #0b0d10;
    --panel: #14181d;
    --panel-2: #1a2027;
    --line: #232a33;
    --fg: #e6edf3;
    --fg-dim: #93a1b1;
    --accent: #7ee787;
    --accent-2: #58a6ff;
    --shadow: 0 10px 40px rgba(0,0,0,.5);
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: radial-gradient(ellipse at top, #161b22 0%, var(--bg) 50%);
    color: var(--fg);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100%;
    max-width: 1100px;
    margin: 0 auto;
    padding: 16px;
    gap: 12px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .brand {
    display: flex; align-items: baseline; gap: 10px;
  }
  .brand h1 {
    margin: 0; font-size: 20px; font-weight: 600;
    letter-spacing: .5px;
    color: var(--fg);
  }
  .brand .tag {
    color: var(--fg-dim); font-size: 12px;
    font-family: var(--mono);
  }
  .actions { display: flex; gap: 8px; align-items: center; }
  button, label.btn, input[type=file]::file-selector-button {
    appearance: none;
    background: var(--panel-2);
    color: var(--fg);
    border: 1px solid var(--line);
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--sans);
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  button:hover, label.btn:hover { background: #222a34; border-color: #2f3742; }
  button.primary { background: var(--accent); color: #0b0d10; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: #5dd66c; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  input[type=file] { display: none; }

  main {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
    min-height: 0;
    position: relative;
  }
  .screen-wrap {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; padding: 16px;
  }
  canvas#canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #c4cfa1;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,.6);
    max-width: 100%; max-height: 100%;
    width: 480px; height: 432px; /* 160*3 x 144*3 */
    outline: none;
  }
  .splash {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 24px; text-align: center;
    background: var(--panel);
    z-index: 5;
  }
  .splash h2 { margin: 0; font-weight: 500; color: var(--fg-dim); font-size: 16px; }
  .splash .hint { color: var(--fg-dim); font-size: 13px; max-width: 320px; line-height: 1.5; }
  .status {
    font-family: var(--mono); font-size: 12px;
    color: var(--fg-dim);
    margin-top: 8px;
    white-space: pre;
  }

  footer {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    color: var(--fg-dim);
    font-size: 12px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
  }
  .controls { font-family: var(--mono); }
  .controls kbd {
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-bottom-width: 2px;
    border-radius: 3px;
    padding: 1px 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg);
    margin: 0 1px;
  }
  .meta { text-align: right; }
  .meta a { color: var(--accent-2); text-decoration: none; }
  .meta a:hover { text-decoration: underline; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <h1>RustyBoy</h1>
      <span class="tag">// RustyBoy DMG Emulator</span>
    </div>
    <div class="actions">
      <label class="btn" for="rom-input">Load ROM…</label>
      <input id="rom-input" type="file" accept=".gb,.gbc,.bin">
      <button id="reset-btn" disabled>Reset</button>
      <button id="fullscreen-btn" disabled>Fullscreen</button>
    </div>
  </header>

  <main>
    <div class="screen-wrap">
      <canvas id="canvas" tabindex="-1" oncontextmenu="event.preventDefault()"></canvas>
    </div>
    <div class="splash" id="splash">
      <h2>Drop a Game Boy ROM (.gb) to begin</h2>
      <div class="hint">Choose a file with the button above or drag &amp; drop it onto this window.</div>
      <div class="status" id="status">Loading runtime…</div>
    </div>
  </main>

  <footer>
    <div class="controls">
      <kbd>←</kbd><kbd>→</kbd><kbd>↑</kbd><kbd>↓</kbd> D-Pad &nbsp;·&nbsp;
      <kbd>Z</kbd> A &nbsp; <kbd>X</kbd> B &nbsp;·&nbsp;
      <kbd>Enter</kbd> Start &nbsp; <kbd>Shift</kbd> Select &nbsp;·&nbsp;
      <kbd>Esc</kbd> Quit
    </div>
    <div class="meta">
      Saves persist to <code>localStorage</code> · built {{TS}}
    </div>
  </footer>
</div>

<script type="text/javascript">
  const splash = document.getElementById('splash');
  const status = document.getElementById('status');
  const resetBtn = document.getElementById('reset-btn');
  const fsBtn = document.getElementById('fullscreen-btn');
  const romInput = document.getElementById('rom-input');
  const canvas = document.getElementById('canvas');

  let currentRomBytes = null;
  let currentRomName = null;

  function setStatus(msg) {
    if (status) status.textContent = msg;
    console.log('[rustyboy]', msg);
  }

  function bootWithRom(bytes, name) {
    currentRomBytes = bytes;
    currentRomName = name || 'rom.gb';
    setStatus('Loaded ' + currentRomName + ' (' + bytes.length + ' bytes). Starting…');
    try {
      const path = '/rom.gb';
      Module.FS.writeFile(path, bytes);
      const key = 'rustyboy_save:' + currentRomName;
      try {
        const saved = localStorage.getItem(key);
        if (saved) {
          const bin = atob(saved);
          const buf = new Uint8Array(bin.length);
          for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
          Module.FS.writeFile('/save.sav', buf);
        }
      } catch (e) { console.warn('save load failed', e); }
      splash.classList.add('hidden');
      resetBtn.disabled = false;
      fsBtn.disabled = false;
      canvas.focus();
      Module.callMain([path, '/save.sav', key]);
    } catch (e) {
      setStatus('Failed to start: ' + e);
      console.error(e);
    }
  }

  romInput.addEventListener('change', (ev) => {
    const f = ev.target.files && ev.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      const bytes = new Uint8Array(r.result);
      if (Module._main_started) {
        // Already running — reload by writing new ROM and signaling. Easiest path: reload page with file cached.
        location.reload();
        return;
      }
      bootWithRom(bytes, f.name);
    };
    r.readAsArrayBuffer(f);
  });

  ['dragenter','dragover'].forEach(t =>
    window.addEventListener(t, e => { e.preventDefault(); e.stopPropagation(); }));
  window.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation();
    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => bootWithRom(new Uint8Array(r.result), f.name);
    r.readAsArrayBuffer(f);
  });

  resetBtn.addEventListener('click', () => location.reload());
  fsBtn.addEventListener('click', () => {
    if (canvas.requestFullscreen) canvas.requestFullscreen();
  });

  var Module = {
    canvas: canvas,
    noInitialRun: true,
    printErr: function (text) { console.warn(text); },
    print: function (text) { console.log(text); setStatus(text); },
    onRuntimeInitialized: function () {
      setStatus('Runtime ready. Waiting for ROM…');
      Module._main_started = false;
    },
    onAbort: function (reason) {
      setStatus('Aborted: ' + reason);
    },
    locateFile: function (path) { return path; },
  };

  // Prevent the canvas from grabbing keyboard if user is typing elsewhere; emscripten attaches to window.
  canvas.addEventListener('click', () => canvas.focus());
</script>

{{{ SCRIPT }}}
</body>
</html>
